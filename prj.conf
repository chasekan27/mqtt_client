# Core Network Sockets & Secure TLS Layer Configuration
CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_MQTT_LIB_TLS=y

# Allocate heap space required by Mbed TLS for handshakes
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
# Required for parsing certificates (like the HiveMQ Root CA)
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_HAVE_TIME_DATE=y

# Core TLS support and version configuration
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_TLS_VERSION_1_2=y


# Enable Key Exchanges via Zephyr's Kconfig mappings
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_RSA_ENABLED=y
CONFIG_MBEDTLS_KEY_EXCHANGE_ECDHE_ECDSA_ENABLED=y

# Enable Elliptic Curve Cryptography (Required for ECDHE)

# Enable Hash, Cipher, and TLS extension support

# Heap and Certificate Requirements
CONFIG_MBEDTLS_ENABLE_HEAP=y
CONFIG_MBEDTLS_HEAP_SIZE=16384
CONFIG_MBEDTLS_X509_CRT_PARSE_C=y
CONFIG_MBEDTLS_HAVE_TIME_DATE=y