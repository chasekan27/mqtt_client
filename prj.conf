CONFIG_MAIN_STACK_SIZE=5100
CONFIG_HWINFO=y
CONFIG_CBPRINTF_FP_SUPPORT=y

CONFIG_HEAP_MEM_POOL_SIZE=95000
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=6144

# BT Related Config
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Zephyr Demo"

# Allow for large Bluetooth data packets.
CONFIG_BT_L2CAP_TX_MTU=240
CONFIG_BT_BUF_ACL_RX_SIZE=240
CONFIG_BT_BUF_ACL_TX_SIZE=240


# Enable MCUmgr and dependencies.
CONFIG_NET_BUF=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# File System
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_SHELL=y

# Logging configurations
CONFIG_LOG=y

# Shell Config
CONFIG_SHELL=y

# Networking
CONFIG_NETWORKING=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_INIT_STACKS=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=2048
CONFIG_NET_TCP_WORKQ_STACK_SIZE=4096
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONNECTION_MANAGER=y

# Network buffers
CONFIG_NET_PKT_RX_COUNT=35
CONFIG_NET_PKT_TX_COUNT=35
CONFIG_NET_BUF_RX_COUNT=35
CONFIG_NET_BUF_TX_COUNT=35
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_NET_DHCPV4=y
CONFIG_ESP32_WIFI_STA_AUTO_DHCPV4=y
CONFIG_NET_SHELL=y

CONFIG_MQTT_LIB=y
CONFIG_MQTT_CLEAN_SESSION=y

# Wifi
CONFIG_WIFI=y

CONFIG_WATCHDOG=y
CONFIG_WDT_DISABLE_AT_BOOT=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_MIN_TIMEOUT=500

# Disables unused for size optimise
CONFIG_LOG_BACKEND_RTT=n

CONFIG_POSIX_API=y

CONFIG_MOSQUITTO_CLIENT_ID="zephyr-123234"
CONFIG_MOSQUITTO_HOSTNAME="test.mosquitto.org"
CONFIG_MOSQUITTO_SERVER_IP="5.196.78.28"
CONFIG_MOSQUITTO_SERVER_PORT=1883

CONFIG_SENSOR=y
CONFIG_STDOUT_CONSOLE=y
CONFIG_CBPRINTF_FP_SUPPORT=y
