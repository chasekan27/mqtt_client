# --- Core Options ---
CONFIG_MAIN_STACK_SIZE=3584
CONFIG_HWINFO=y
CONFIG_CBPRINTF_FP_SUPPORT=y
CONFIG_HEAP_MEM_POOL_SIZE=81984
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=3072

# --- BT Related Config ---
CONFIG_BT=y
CONFIG_BT_SMP=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="Zephyr Demo"
CONFIG_BT_L2CAP_TX_MTU=65
CONFIG_BT_BUF_ACL_RX_SIZE=69
CONFIG_BT_BUF_ACL_TX_SIZE=69
CONFIG_BT_CONN_TX_MAX=10
# --- Flash & File System ---
CONFIG_NET_BUF=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_SHELL=n

# --- Diagnostics & Shell ---
CONFIG_LOG=y
CONFIG_SHELL=n

# --- Networking Stack Core ---
CONFIG_NETWORKING=y
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_ENTROPY_GENERATOR=y
CONFIG_INIT_STACKS=y
CONFIG_NET_MGMT_EVENT_STACK_SIZE=1536
CONFIG_NET_TCP_WORKQ_STACK_SIZE=2048
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_UDP=y

# --- Network Buffers ---
CONFIG_NET_PKT_RX_COUNT=14
CONFIG_NET_PKT_TX_COUNT=14
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_CONTEXT_NET_PKT_POOL=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SHELL=n

# --- Wi-Fi & MQTT Subsystems ---
CONFIG_WIFI=y
CONFIG_MQTT_LIB=y
CONFIG_MQTT_CLEAN_SESSION=y

# --- Watchdog (Fixed) ---
CONFIG_WATCHDOG=y
CONFIG_TASK_WDT=y
CONFIG_TASK_WDT_MIN_TIMEOUT=500
# REMOVED: CONFIG_WDT_DISABLE_AT_BOOT=y (Not supported on ESP32)

# --- App Settings & Targets ---
CONFIG_POSIX_API=y
# CONFIG_MOSQUITTO_CLIENT_ID="zephyr-123234"
# CONFIG_MOSQUITTO_HOSTNAME="test.mosquitto.org"
# CONFIG_MOSQUITTO_SERVER_IP="5.196.78.28"
# CONFIG_MOSQUITTO_SERVER_PORT=1883
CONFIG_SENSOR=y
CONFIG_STDOUT_CONSOLE=y

CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y
CONFIG_WIFI_STA_AUTO_DHCPV4=y


# HiveMQ Cloud Target Broker Settings
CONFIG_MOSQUITTO_CLIENT_ID="zephyr-123234"
CONFIG_MOSQUITTO_HOSTNAME="dc69f81904184c9eb8612ea26d2fa1bf.s1.eu.hivemq.cloud"
CONFIG_MOSQUITTO_SERVER_PORT=8883
CONFIG_MOSQUITTO_USERNAME="zephyr_client"
CONFIG_MOSQUITTO_PASSWORD="Tvadivel1."

# DNS Client Configuration
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_RESOLVER_MAX_SERVERS=2
CONFIG_DNS_NUM_CONCUR_QUERIES=2

# Hardcoded System DNS Server (Fallback e.g., Google DNS)
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"

# Core Network Sockets & Secure TLS Layer Configuration
CONFIG_TLS_CREDENTIALS=y
CONFIG_NET_SOCKETS_SOCKOPT_TLS=y
CONFIG_MQTT_LIB_TLS=y

